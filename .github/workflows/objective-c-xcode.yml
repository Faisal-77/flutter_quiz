name: Build IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Fix win32 iOS compatibility
        run: |
          find $HOME/.pub-cache/hosted/pub.dev/win32-5.5.0 -name "*.dart" | xargs grep -l "UnmodifiableUint8ListView" | while read f; do
            sed -i '' 's/UnmodifiableUint8ListView/Uint8List/g' "$f"
          done

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: app.ipa
